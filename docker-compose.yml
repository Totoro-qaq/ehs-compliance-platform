services:
  redis:
    image: redis:7-alpine
    container_name: ehs_redis
    ports:
      - "6379:6379"
    volumes:
      - ehs_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: ehs_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_PASSWORD:-changeme}"
      MYSQL_DATABASE: "${MYSQL_DB:-ehs_system}"
      MYSQL_CHARSET: utf8mb4
    volumes:
      - ehs_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ehs_api
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ehs_uploads:/app/uploads
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  worker:
    build: .
    container_name: ehs_worker
    command: celery -A app.tasks.worker:celery_app worker --loglevel=info
    volumes:
      - .:/app
      - ehs_uploads:/app/uploads
      - paddle_models:/root/.paddleocr
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

  beat:
    build: .
    container_name: ehs_beat
    command: celery -A app.tasks.worker:celery_app beat --loglevel=info
    volumes:
      - .:/app
      - ehs_uploads:/app/uploads
      - paddle_models:/root/.paddleocr
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy

volumes:
  ehs_redis_data:
  ehs_mysql_data:
  ehs_uploads:
  paddle_models:
