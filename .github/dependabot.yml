# Dependabot 配置：自动检查并提 PR 升级依赖
# 文档： https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # ---- Python 后端依赖 ----
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    target-branch: develop
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      # 把次/补丁版本升级合并成一个 PR，减少噪音
      python-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # PaddleOCR 体系版本升级常带兼容性破坏，手动跟进
      - dependency-name: paddlepaddle
      - dependency-name: paddleocr
      - dependency-name: pdf2image

  # ---- 前端 Vue 工程 ----
  - package-ecosystem: npm
    directory: "/frontend-vue"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    target-branch: develop
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # ---- GitHub Actions 自身 ----
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 3
    target-branch: develop
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope
