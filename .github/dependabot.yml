# Dependabot 配置：单人项目轻量策略
# - 月度跑，避免每周一堆 PR 堆积
# - 限制 PR 数量
# - 只升级 patch 版本，minor / major 让用户手动评估
# 文档： https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # ---- Python 后端依赖 ----
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: monthly
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 2
    target-branch: develop
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      python-patches:
        update-types:
          - patch
    ignore:
      # 仅升级 patch；minor / major 手动评估
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
      # PaddleOCR 体系版本升级常带兼容性破坏，完全忽略
      - dependency-name: paddlepaddle
      - dependency-name: paddleocr
      - dependency-name: pdf2image

  # ---- 前端 Vue 工程 ----
  - package-ecosystem: npm
    directory: "/frontend-vue"
    schedule:
      interval: monthly
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 2
    target-branch: develop
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore(deps)
      include: scope
    groups:
      npm-patches:
        update-types:
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major

  # ---- GitHub Actions 自身 ----
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 1
    target-branch: develop
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
      include: scope
