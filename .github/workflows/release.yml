name: Release

# 推送形如 v1.2.3 的 tag 时自动发布 Release，附带前端构建产物
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的 tag（必须已存在），如 v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build artifacts and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉全历史，便于自动生成 changelog

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Build frontend
        working-directory: frontend-vue
        run: |
          npm ci
          npm run build

      - name: Package frontend dist
        run: |
          cd frontend-vue
          tar -czf "../ehs-frontend-${{ steps.tag.outputs.ref }}.tar.gz" dist
          cd ..
          zip -rq "ehs-frontend-${{ steps.tag.outputs.ref }}.zip" frontend-vue/dist

      - name: Generate release notes
        id: notes
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: |
            {
              "categories": [
                {"title": "## Features",   "labels": ["feature", "enhancement", "feat"]},
                {"title": "## Bug Fixes",  "labels": ["bug", "fix"]},
                {"title": "## Documentation", "labels": ["docs", "documentation"]},
                {"title": "## CI / Build", "labels": ["ci", "build"]},
                {"title": "## Dependencies", "labels": ["dependencies"]},
                {"title": "## Other",      "labels": []}
              ],
              "template": "#{{CHANGELOG}}\n\n**Full Changelog**: #{{RELEASE_DIFF}}"
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: ${{ steps.tag.outputs.ref }}
          body: ${{ steps.notes.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.ref, '-') }}
          files: |
            ehs-frontend-${{ steps.tag.outputs.ref }}.tar.gz
            ehs-frontend-${{ steps.tag.outputs.ref }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
