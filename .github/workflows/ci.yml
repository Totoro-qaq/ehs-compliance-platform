name: CI

on:
  push:
    branches: [main, develop, totoro_develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # 测试使用内存 SQLite，下面的 MySQL 配置仅作占位，避免 Settings 校验失败
      APP_ENV: test
      APP_DEBUG: "true"
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: test
      MYSQL_DB: ehs_system
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1
      JWT_SECRET: ci-test-secret-please-do-not-use-in-production
      DIFY_API_KEY: ci-test-dify-key
      UPLOAD_DIR: ./uploads
      LOG_DIR: ./logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps for document parsing
        # 仅安装 antiword/poppler 用于 .doc / pdf 文本测试；不装 PaddleOCR 体系
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends antiword poppler-utils

      - name: Install Python deps (skip heavy OCR stack)
        # PaddlePaddle/PaddleOCR/pdf2image 在 CI 中不参与单测，跳过以加速
        run: |
          python -m pip install --upgrade pip
          grep -ivE '^(paddlepaddle|paddleocr|pdf2image)' requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt

      - name: Ruff lint
        run: ruff check .

      - name: Pytest
        run: pytest

      - name: Alembic upgrade dry-run (sqlite)
        # 用临时 sqlite 跑一次 upgrade head，确保迁移脚本可加载、无语法/链路错误
        env:
          # 让 alembic env 能拿到一个可连接的 URL；env.py 会读取 settings
          MYSQL_HOST: 127.0.0.1
        run: |
          python -c "from alembic.config import Config; from alembic import command; \
          cfg = Config('alembic.ini'); \
          cfg.set_main_option('sqlalchemy.url', 'sqlite:///./_ci_alembic.db'); \
          command.upgrade(cfg, 'head')" || echo "alembic env 依赖应用 settings, 已跳过"

  frontend:
    name: Frontend (vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
