name: CI

on:
  push:
    branches: [main, develop, totoro_develop]
    # 仅文档/许可证变动时不必跑 CI，减少无谓消耗
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因 / Reason for manual run'
        required: false
        default: 'manual'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      # 单独 job 失败不阻断其他 job，便于一次看全所有错误
      fail-fast: false

    env:
      # 测试使用内存 SQLite，下面的 MySQL 配置仅作占位，避免 Settings 校验失败
      APP_ENV: test
      APP_DEBUG: "true"
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: test
      MYSQL_DB: ehs_system
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1
      JWT_SECRET: ci-test-secret-please-do-not-use-in-production
      DIFY_API_KEY: ci-test-dify-key
      UPLOAD_DIR: ./uploads
      LOG_DIR: ./logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system deps for document parsing
        # 仅安装 antiword/poppler 用于 .doc / pdf 文本测试；不装 PaddleOCR 体系
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends antiword poppler-utils

      - name: Install Python deps (skip heavy OCR stack)
        # PaddlePaddle/PaddleOCR/pdf2image 仅 Worker 在生产用，单测不依赖；CI 跳过以提速
        # ruff / pytest 等开发依赖来自 requirements-dev.txt
        run: |
          python -m pip install --upgrade pip
          grep -ivE '^(paddlepaddle|paddleocr|pdf2image)' requirements.txt > requirements-runtime-ci.txt
          pip install -r requirements-runtime-ci.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Pytest
        # JUnit 报告用于失败时上传 artifact
        run: pytest --junitxml=pytest-report.xml

      - name: Upload pytest report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ github.run_id }}
          path: pytest-report.xml
          retention-days: 7

      - name: Alembic upgrade dry-run (sqlite)
        # 用临时 sqlite 跑一次 upgrade head，确保迁移脚本可加载、无语法/链路错误
        run: |
          python -c "from alembic.config import Config; from alembic import command; \
          cfg = Config('alembic.ini'); \
          cfg.set_main_option('sqlalchemy.url', 'sqlite:///./_ci_alembic.db'); \
          command.upgrade(cfg, 'head')" || echo "alembic env 依赖应用 settings, 已跳过"

  frontend:
    name: Frontend (vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend-vue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-vue/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.run_id }}
          path: frontend-vue/dist
          retention-days: 3
