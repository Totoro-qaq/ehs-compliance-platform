# Release Notes 自动归类配置（用于 GitHub 原生 generate_release_notes）
# 触发条件：在 release.yml 中开启 generate_release_notes: true
# 文档： https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
    authors:
      - dependabot[bot]
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
        - feat
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📝 Documentation
      labels:
        - docs
        - documentation
    - title: 🔧 CI / Build
      labels:
        - ci
        - build
    - title: ⬆️ Dependencies
      labels:
        - dependencies
    - title: 🔒 Security
      labels:
        - security
    - title: Other Changes
      labels:
        - "*"
