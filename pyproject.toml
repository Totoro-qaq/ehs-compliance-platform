[tool.pyright]
include = ["app", "main.py"]
pythonVersion = "3.13"
typeCheckingMode = "basic"

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "SIM"]
ignore = [
  "E501", # keep long Chinese API descriptions readable
  "B008", # FastAPI intentionally uses Depends/File/Form/Query in defaults
]

[tool.ruff.lint.per-file-ignores]
"alembic/env.py" = ["E402"]
"scripts/create_db.py" = ["E402"]

[tool.ruff.format]
quote-style = "single"
